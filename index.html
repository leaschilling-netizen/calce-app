<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Calce de Calçados</title>
<link rel="manifest" href="data:application/json,{&quot;name&quot;:&quot;Calce App&quot;,&quot;display&quot;:&quot;standalone&quot;,&quot;background_color&quot;:&quot;#f5f4f0&quot;}">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#f5f4f0;--card:#fff;--border:#e0deda;--text:#1a1a18;--muted:#888780;
  --accent:#1D9E75;--accent-l:#E1F5EE;--accent-d:#0F6E56;
  --warn:#BA7517;--warn-l:#FAEEDA;
  --danger:#E24B4A;--danger-l:#FCEBEB;
  --info:#378ADD;--info-l:#E6F1FB;
  --purple:#534AB7;--purple-l:#EEEDFE;
  --r:10px;--rl:16px;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);font-size:15px;min-height:100vh}

/* ── TOP BAR ── */
.topbar{background:var(--card);border-bottom:1px solid var(--border);padding:0 16px;display:flex;align-items:center;justify-content:space-between;height:52px;position:sticky;top:0;z-index:100;gap:8px}
.topbar h1{font-size:15px;font-weight:600;display:flex;align-items:center;gap:6px;white-space:nowrap}
.pill{background:var(--accent-l);color:var(--accent-d);font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;display:flex;align-items:center;gap:4px;white-space:nowrap}
.pill::before{content:'';width:6px;height:6px;background:var(--accent);border-radius:50%;display:inline-block}

/* ── USER BAR ── */
.userbar{background:#fff;border-bottom:1px solid var(--border);padding:8px 16px;display:flex;align-items:center;gap:8px;font-size:13px;flex-wrap:wrap}
.userbar label{color:var(--muted);font-weight:500;white-space:nowrap}
.userbar input{border:1px solid var(--border);border-radius:6px;padding:6px 10px;font-size:13px;font-family:inherit;background:var(--bg);color:var(--text);width:150px}
.userbar input:focus{outline:none;border-color:var(--accent)}

/* ── BUTTONS ── */
.btn{background:var(--card);border:1px solid var(--border);border-radius:7px;padding:7px 14px;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;color:var(--text);transition:all .15s;white-space:nowrap}
.btn:hover{background:var(--bg)}
.btn:active{transform:scale(.97)}
.btn-accent{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-accent:hover{background:var(--accent-d)}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-danger{background:var(--danger-l);color:var(--danger);border-color:var(--danger)}
.btn-danger:hover{background:var(--danger);color:#fff}
.btn-icon{padding:5px 8px;font-size:14px}

/* ── MAIN ── */
.main{padding:16px;max-width:1400px;margin:0 auto}
.toolbar{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.toolbar h2{font-size:13px;font-weight:500;color:var(--muted);flex:1}
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:14px}

/* ── CARD ── */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--rl);overflow:hidden}
.card-header{padding:12px 14px 10px;display:flex;align-items:flex-start;gap:10px;border-bottom:1px solid var(--border)}
.card-img{width:80px;height:80px;border-radius:8px;background:var(--bg);border:1px solid var(--border);flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative}
.card-img img{width:100%;height:100%;object-fit:cover}
.card-img .hint{position:absolute;inset:0;background:rgba(0,0,0,.5);color:#fff;font-size:11px;display:flex;align-items:center;justify-content:center;opacity:0;transition:.2s;text-align:center;padding:4px}
.card-img:hover .hint{opacity:1}
.card-info{flex:1;min-width:0}
.card-ref{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:2px}
.card-name{font-size:15px;font-weight:600;margin-bottom:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.card-date{font-size:11px;color:var(--muted)}
.card-actions{display:flex;gap:5px;flex-shrink:0}

/* ── SECTIONS ── */
.sec{padding:10px 14px;border-bottom:1px solid var(--border)}
.sec-lbl{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:7px;display:flex;align-items:center;justify-content:space-between;gap:6px}
.sec-lbl span{display:flex;align-items:center;gap:5px}
.dot{width:7px;height:7px;border-radius:50%;display:inline-block;flex-shrink:0}
.d-info{background:var(--info)}.d-warn{background:var(--warn)}.d-purple{background:var(--purple)}

.obs-box{font-size:13px;line-height:1.55;background:var(--info-l);border-radius:7px;padding:8px 10px;color:#185FA5;min-height:36px}
.obs-empty{color:var(--muted);font-style:italic;background:var(--bg)}

.plano-item{display:flex;gap:7px;margin-bottom:6px;background:var(--warn-l);border-radius:7px;padding:7px 9px;cursor:pointer}
.plano-item:last-child{margin-bottom:0}
.plano-item:hover{filter:brightness(.97)}
.plano-dot{width:5px;height:5px;border-radius:50%;background:var(--warn);margin-top:6px;flex-shrink:0}
.plano-body{flex:1;font-size:13px}
.plano-acao{font-weight:500;color:var(--text)}
.plano-meta{font-size:11px;color:var(--warn);margin-top:2px;font-weight:500}
.sbadge{display:inline-block;padding:2px 7px;border-radius:10px;font-size:10px;font-weight:600;margin-top:3px}
.s-aberto{background:#FCEBEB;color:#A32D2D}
.s-em-andamento{background:var(--warn-l);color:var(--warn)}
.s-concluido{background:var(--accent-l);color:var(--accent-d)}

/* ── COMMENTS ── */
.cmt-sec{padding:10px 14px 12px}
.cmt-item{display:flex;gap:7px;margin-bottom:7px}
.avatar{width:26px;height:26px;border-radius:50%;font-size:10px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.cmt-body{flex:1;background:var(--bg);border-radius:0 7px 7px 7px;padding:6px 9px}
.cmt-user{font-size:11px;font-weight:600;color:var(--purple);margin-bottom:1px}
.cmt-text{font-size:13px;line-height:1.4;word-break:break-word}
.cmt-time{font-size:10px;color:var(--muted);margin-top:2px}
.cmt-row{display:flex;gap:7px;margin-top:8px;align-items:center}
.cmt-input{flex:1;border:1px solid var(--border);border-radius:7px;padding:7px 10px;font-size:13px;font-family:inherit;background:var(--bg);color:var(--text)}
.cmt-input:focus{outline:none;border-color:var(--accent)}
.more-btn{background:none;border:none;cursor:pointer;color:var(--info);font-size:12px;font-weight:500;padding:2px 0;font-family:inherit;display:block;margin-bottom:5px}

/* ── MODAL ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:flex-end;justify-content:center;padding:0}
@media(min-width:600px){.overlay{align-items:center;padding:20px}}
.modal{background:var(--card);border-radius:20px 20px 0 0;width:100%;max-width:560px;max-height:92vh;overflow-y:auto}
@media(min-width:600px){.modal{border-radius:var(--rl)}}
.modal-hdr{padding:16px 18px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--card);z-index:1}
.modal-hdr h3{font-size:15px;font-weight:600}
.modal-body{padding:16px 18px}
.modal-ftr{padding:12px 18px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end;position:sticky;bottom:0;background:var(--card)}
.fg{margin-bottom:13px}
.fg label{display:block;font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.3px;margin-bottom:4px}
.fg input,.fg textarea,.fg select{width:100%;border:1px solid var(--border);border-radius:7px;padding:8px 10px;font-size:14px;font-family:inherit;background:var(--bg);color:var(--text)}
.fg input:focus,.fg textarea:focus,.fg select:focus{outline:none;border-color:var(--accent)}
.fg textarea{resize:vertical;min-height:76px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.img-drop{width:100%;height:110px;border-radius:8px;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:28px;color:var(--muted);border:2px dashed var(--border);cursor:pointer;overflow:hidden;margin-bottom:5px;position:relative}
.img-drop img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.img-drop span{position:relative;z-index:1}
.img-drop-hint{font-size:11px;color:var(--muted);text-align:center;position:relative;z-index:1}
.sep{border:none;border-top:1px solid var(--border);margin:4px 0 12px}
.sec-title{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:8px}
.plano-form-item{background:var(--bg);border-radius:8px;padding:10px;margin-bottom:8px;border:1px solid var(--border)}
.plano-form-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.plano-form-hdr span{font-size:12px;font-weight:600;color:var(--warn)}

/* ── EMPTY / LOADING ── */
.empty{text-align:center;padding:56px 20px;color:var(--muted);grid-column:1/-1}
.empty .ico{font-size:44px;margin-bottom:14px}
.empty h3{font-size:15px;font-weight:600;margin-bottom:5px;color:var(--text)}
.empty p{font-size:13px;line-height:1.5}
.loading-bar{height:2px;background:linear-gradient(90deg,var(--accent),var(--info));animation:lb 1.2s infinite;position:fixed;top:0;left:0;right:0;z-index:999}
@keyframes lb{0%{opacity:1}50%{opacity:.4}100%{opacity:1}}

/* ── SETUP BANNER ── */
.setup-banner{background:#FAEEDA;border:1px solid #BA7517;border-radius:var(--r);padding:12px 16px;margin-bottom:16px;font-size:13px;color:#7a4e0a;line-height:1.6}
.setup-banner strong{display:block;font-size:14px;margin-bottom:4px}
.setup-banner code{background:#fff8ee;padding:1px 5px;border-radius:4px;font-family:monospace;font-size:12px}

@media(max-width:400px){.cards-grid{grid-template-columns:1fr}.g3{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>

<!-- Loading bar -->
<div class="loading-bar" id="loadBar" style="display:none"></div>

<div class="topbar">
  <h1>👟 Calce de Calçados</h1>
  <div class="pill" id="syncPill">online</div>
</div>

<div class="userbar">
  <label>Seu nome:</label>
  <input id="unInput" placeholder="Digite seu nome…" maxlength="30"
    onkeydown="if(event.key==='Enter')setUser()">
  <button class="btn btn-sm btn-accent" id="unBtn" onclick="setUser()">Entrar</button>
  <span id="unLabel" style="font-weight:600;color:var(--accent);display:none"></span>
</div>

<div class="main">
  <div id="setupBanner"></div>
  <div class="toolbar">
    <h2 id="countLbl">Carregando…</h2>
    <button class="btn btn-accent" onclick="openNewCard()">+ Novo modelo</button>
  </div>
  <div id="grid" class="cards-grid">
    <div class="empty" style="grid-column:1/-1"><div class="ico">⏳</div><p>Carregando dados…</p></div>
  </div>
</div>

<!-- Modal card -->
<div id="mCard" class="overlay" style="display:none" onclick="overlayClick(event,'mCard')">
 <div class="modal">
  <div class="modal-hdr"><h3 id="mCardTitle">Novo modelo</h3><button class="btn btn-sm btn-icon" onclick="closeM('mCard')">✕</button></div>
  <div class="modal-body">
    <div class="fg">
      <label>Foto do calçado</label>
      <div class="img-drop" id="imgDrop" onclick="document.getElementById('imgFile').click()">
        <span>📷</span><div class="img-drop-hint">Toque para adicionar foto</div>
      </div>
      <input type="file" id="imgFile" accept="image/*" onchange="onImgFile(event)" style="display:none">
    </div>
    <div class="g2">
      <div class="fg"><label>Referência</label><input id="fRef" placeholder="REF-001"></div>
      <div class="fg"><label>Nome do modelo</label><input id="fNome" placeholder="Sport Runner"></div>
    </div>
    <div class="fg"><label>Numeração testada</label><input id="fNum" placeholder="Ex: 38, 39/40"></div>
    <div class="fg"><label>Observações de calce</label>
      <textarea id="fObs" placeholder="Ajuste, conforto, pressão, pontos de melhoria…"></textarea></div>
    <hr class="sep">
    <div class="sec-title">Planos de ação</div>
    <div id="planosForm"></div>
    <button class="btn btn-sm" onclick="addPF()" style="width:100%">+ Adicionar ação</button>
  </div>
  <div class="modal-ftr">
    <button class="btn" onclick="closeM('mCard')">Cancelar</button>
    <button class="btn btn-accent" onclick="saveCard()">Salvar</button>
  </div>
 </div>
</div>

<!-- Modal plano rápido -->
<div id="mPlano" class="overlay" style="display:none" onclick="overlayClick(event,'mPlano')">
 <div class="modal">
  <div class="modal-hdr"><h3 id="mPlanoTitle">Plano de ação</h3><button class="btn btn-sm btn-icon" onclick="closeM('mPlano')">✕</button></div>
  <div class="modal-body">
    <div class="fg"><label>Descrição da ação</label><textarea id="pAcao" placeholder="O que precisa ser feito…" style="min-height:72px"></textarea></div>
    <div class="g2">
      <div class="fg"><label>Responsável</label><input id="pResp" placeholder="Nome"></div>
      <div class="fg"><label>Prazo</label><input type="date" id="pPrazo"></div>
    </div>
    <div class="fg"><label>Status</label>
      <select id="pStatus">
        <option value="aberto">Aberto</option>
        <option value="em-andamento">Em andamento</option>
        <option value="concluido">Concluído</option>
      </select></div>
  </div>
  <div class="modal-ftr">
    <button class="btn" onclick="closeM('mPlano')">Cancelar</button>
    <button class="btn btn-accent" onclick="savePlano()">Salvar</button>
  </div>
 </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
// CONFIGURAÇÃO — JSONBin.io (gratuito, sem instalar nada)
//
// COMO CONFIGURAR EM 2 MINUTOS:
// 1. Acesse https://jsonbin.io e clique em "Sign Up" (grátis)
// 2. Faça login e vá em "API Keys" no menu
// 3. Clique em "+ CREATE ACCESS KEY"
// 4. Copie a chave e cole em API_KEY abaixo
// 5. Salve o arquivo e faça upload no Netlify
// ═══════════════════════════════════════════════════════════════
const API_KEY  = "COLE_SUA_CHAVE_JSONBIN_AQUI";
const BIN_NAME = "calce-calcados-v1";
// ═══════════════════════════════════════════════════════════════

let binId    = localStorage.getItem('jsonbin_id_' + BIN_NAME) || null;
let cards    = [];
let curUser  = localStorage.getItem('calce_user') || '';
let editId   = null;
let editPlanoId  = null;
let editPlanoIdx = null;
let tempImg  = null;
let pf       = [];  // planos form list
let polling  = null;

const isConfigured = () => API_KEY !== $2a$10$02XNcDyszGNcLaeFLh.yFuBwLZ2.jlrbq6.LZf.taWTSmLFNfopDy;

// ── Usuário ─────────────────────────────────────────────────────
function setUser() {
  const v = document.getElementById('unInput').value.trim();
  if (!v) return;
  curUser = v;
  localStorage.setItem('calce_user', v);
  document.getElementById('unLabel').textContent = '✓ ' + v;
  document.getElementById('unLabel').style.display = 'inline';
  document.getElementById('unInput').style.display = 'none';
  document.getElementById('unBtn').style.display = 'none';
}
if (curUser) {
  document.getElementById('unInput').value = curUser;
  setUser();
}

function getUser() { return curUser || 'Anônimo'; }

function uColor(n) {
  const c = ['#534AB7','#1D9E75','#D85A30','#BA7517','#378ADD','#D4537E'];
  let h = 0; for (const ch of (n||'?')) h = (h*31 + ch.charCodeAt(0)) % c.length;
  return c[h];
}
function initials(n) { return (n||'?').split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2); }
function esc(t) { return (t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function fmtDate(s) {
  if (!s) return '';
  try { const d=new Date(s); return d.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric'}); } catch{return s;}
}
function fmtDT(s) {
  if (!s) return '';
  try { const d=new Date(s); return d.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}); } catch{return s;}
}
function sLabel(s) { return {aberto:'Aberto','em-andamento':'Em andamento',concluido:'Concluído'}[s]||'Aberto'; }
function uid() { return Date.now().toString(36)+Math.random().toString(36).slice(2,6); }

// ── JSONBin API ──────────────────────────────────────────────────
function loading(on) {
  document.getElementById('loadBar').style.display = on ? 'block' : 'none';
}

async function apiGet() {
  if (!binId) return null;
  const r = await fetch(`https://api.jsonbin.io/v3/b/${binId}/latest`, {
    headers: { 'X-Master-Key': API_KEY }
  });
  if (!r.ok) return null;
  const d = await r.json();
  return d.record;
}

async function apiSet(data) {
  if (!binId) {
    // Criar bin novo
    const r = await fetch('https://api.jsonbin.io/v3/b', {
      method: 'POST',
      headers: { 'Content-Type':'application/json','X-Master-Key':API_KEY,'X-Bin-Name':BIN_NAME,'X-Bin-Private':'false' },
      body: JSON.stringify(data)
    });
    if (!r.ok) throw new Error('Erro ao criar bin');
    const d = await r.json();
    binId = d.metadata.id;
    localStorage.setItem('jsonbin_id_' + BIN_NAME, binId);
    return;
  }
  const r = await fetch(`https://api.jsonbin.io/v3/b/${binId}`, {
    method: 'PUT',
    headers: { 'Content-Type':'application/json','X-Master-Key':API_KEY },
    body: JSON.stringify(data)
  });
  if (!r.ok) throw new Error('Erro ao salvar');
}

async function loadData() {
  if (!isConfigured()) { showSetupBanner(); renderCards(); return; }
  loading(true);
  try {
    const d = await apiGet();
    if (d && Array.isArray(d.cards)) cards = d.cards;
    else if (!binId) { await apiSet({cards:[]}); }
    renderCards();
  } catch(e) { console.error(e); }
  loading(false);
}

async function saveData() {
  if (!isConfigured()) return;
  loading(true);
  try { await apiSet({cards}); } catch(e) { alert('Erro ao salvar: '+e.message); }
  loading(false);
}

function showSetupBanner() {
  document.getElementById('setupBanner').innerHTML = `
    <div class="setup-banner">
      <strong>⚙️ Configuração necessária para uso compartilhado</strong>
      Para salvar os dados e compartilhar com a equipe, siga estes passos:<br>
      1. Acesse <strong>jsonbin.io</strong> → Sign Up (grátis) → API Keys → Create Access Key<br>
      2. Copie a chave e cole no arquivo HTML onde diz <code>COLE_SUA_CHAVE_JSONBIN_AQUI</code><br>
      3. Faça upload no <strong>netlify.com/drop</strong> e compartilhe o link pelo WhatsApp<br>
      <em>Enquanto isso, você pode testar o app normalmente (dados ficam só neste dispositivo).</em>
    </div>`;
}

// Polling a cada 20s para sincronizar com outros usuários
function startPolling() {
  if (polling) clearInterval(polling);
  polling = setInterval(loadData, 20000);
}

// ── Render ───────────────────────────────────────────────────────
function renderCards() {
  const grid = document.getElementById('grid');
  document.getElementById('countLbl').textContent =
    cards.length + ' modelo' + (cards.length!==1?'s':'') + ' cadastrado' + (cards.length!==1?'s':'');

  if (!cards.length) {
    grid.innerHTML = `<div class="empty"><div class="ico">👟</div><h3>Nenhum modelo ainda</h3><p>Toque em "+ Novo modelo" para começar.</p></div>`;
    return;
  }
  grid.innerHTML = cards.map(renderCard).join('');
}

function renderCard(c) {
  const img = c.img
    ? `<img src="${c.img}" alt="foto">`
    : `<span style="font-size:26px">📷</span>`;

  const planos = (c.planos||[]).map((p,i) => `
    <div class="plano-item" onclick="openEditPlano('${c.id}',${i})">
      <div class="plano-dot"></div>
      <div class="plano-body">
        <div class="plano-acao">${esc(p.acao)}</div>
        <div class="plano-meta">👤 ${esc(p.resp)}${p.prazo?' · 📅 '+fmtDate(p.prazo):''}</div>
        <span class="sbadge s-${p.status||'aberto'}">${sLabel(p.status)}</span>
      </div>
    </div>`).join('');

  const cmts = (c.comments||[]);
  const shown = cmts.slice(-3);
  const cmtHtml = shown.map(cm => `
    <div class="cmt-item">
      <div class="avatar" style="background:${uColor(cm.user)}22;color:${uColor(cm.user)}">${initials(cm.user)}</div>
      <div class="cmt-body">
        <div class="cmt-user">${esc(cm.user)}</div>
        <div class="cmt-text">${esc(cm.text)}</div>
        <div class="cmt-time">${fmtDT(cm.ts)}</div>
      </div>
    </div>`).join('');

  const moreBtn = cmts.length > 3
    ? `<button class="more-btn" onclick="allComments('${c.id}')">Ver todos os ${cmts.length} comentários</button>` : '';

  return `<div class="card" id="c-${c.id}">
    <div class="card-header">
      <div class="card-img" onclick="clickImg('${c.id}')">
        ${img}
        <div class="hint">📷 Trocar foto</div>
        <input type="file" id="fi-${c.id}" accept="image/*" onchange="onCardImg(event,'${c.id}')" style="display:none">
      </div>
      <div class="card-info">
        <div class="card-ref">${esc(c.ref||'—')}</div>
        <div class="card-name" title="${esc(c.nome)}">${esc(c.nome||'Sem nome')}</div>
        ${c.num?`<div style="font-size:11px;color:var(--muted)">Nº ${esc(c.num)}</div>`:''}
        <div class="card-date">📅 ${fmtDate(c.createdAt)}</div>
      </div>
      <div class="card-actions">
        <button class="btn btn-sm btn-icon" onclick="openEdit('${c.id}')">✏️</button>
        <button class="btn btn-sm btn-icon btn-danger" onclick="delCard('${c.id}')">🗑</button>
      </div>
    </div>

    <div class="sec">
      <div class="sec-lbl"><span><span class="dot d-info"></span>Observações de calce</span></div>
      <div class="obs-box ${c.obs?'':'obs-empty'}">${c.obs?esc(c.obs):'Nenhuma observação registrada.'}</div>
    </div>

    <div class="sec">
      <div class="sec-lbl">
        <span><span class="dot d-warn"></span>Plano de ação (${(c.planos||[]).length})</span>
        <button class="btn btn-sm" onclick="openNewPlano('${c.id}')">+ Ação</button>
      </div>
      ${planos||'<div style="font-size:12px;color:var(--muted);font-style:italic">Nenhuma ação cadastrada.</div>'}
    </div>

    <div class="cmt-sec">
      <div class="sec-lbl" style="margin-bottom:8px"><span><span class="dot d-purple"></span>Comentários (${cmts.length})</span></div>
      ${!cmts.length?'<div style="font-size:12px;color:var(--muted);font-style:italic;margin-bottom:6px">Seja o primeiro a comentar.</div>':''}
      ${cmtHtml}
      ${moreBtn}
      <div class="cmt-row">
        <div class="avatar" style="background:${uColor(getUser())}22;color:${uColor(getUser())}">${initials(getUser())}</div>
        <input class="cmt-input" id="ci-${c.id}" placeholder="Comentar…"
          onkeydown="if(event.key==='Enter')addComment('${c.id}')">
        <button class="btn btn-sm btn-accent" onclick="addComment('${c.id}')">↑</button>
      </div>
    </div>
  </div>`;
}

// ── Imagem ────────────────────────────────────────────────────────
function clickImg(id) { document.getElementById('fi-'+id).click(); }

async function onCardImg(e, id) {
  const f = e.target.files[0]; if (!f) return;
  compressImg(f, base64 => {
    const i = cards.findIndex(c=>c.id===id); if (i<0) return;
    cards[i].img = base64;
    saveData(); renderCards();
  });
}

function onImgFile(e) {
  const f = e.target.files[0]; if (!f) return;
  compressImg(f, base64 => {
    tempImg = base64;
    const d = document.getElementById('imgDrop');
    d.innerHTML = `<img src="${base64}"><span style="display:none"></span>`;
  });
}

function compressImg(file, cb) {
  const reader = new FileReader();
  reader.onload = ev => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      const max = 600;
      let w = img.width, h = img.height;
      if (w > max || h > max) {
        if (w > h) { h = Math.round(h*max/w); w = max; }
        else { w = Math.round(w*max/h); h = max; }
      }
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      cb(canvas.toDataURL('image/jpeg', 0.75));
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
}

// ── Modal card ───────────────────────────────────────────────────
function openNewCard() {
  editId = null; tempImg = null; pf = [];
  document.getElementById('mCardTitle').textContent = 'Novo modelo';
  ['fRef','fNome','fNum','fObs'].forEach(id => document.getElementById(id).value='');
  document.getElementById('imgDrop').innerHTML = '<span>📷</span><div class="img-drop-hint">Toque para adicionar foto</div>';
  renderPF();
  document.getElementById('mCard').style.display='flex';
}

function openEdit(id) {
  const c = cards.find(x=>x.id===id); if (!c) return;
  editId = id; tempImg = c.img||null; pf = JSON.parse(JSON.stringify(c.planos||[]));
  document.getElementById('mCardTitle').textContent = 'Editar modelo';
  document.getElementById('fRef').value = c.ref||'';
  document.getElementById('fNome').value = c.nome||'';
  document.getElementById('fNum').value = c.num||'';
  document.getElementById('fObs').value = c.obs||'';
  const d = document.getElementById('imgDrop');
  d.innerHTML = c.img
    ? `<img src="${c.img}"><span style="display:none"></span>`
    : '<span>📷</span><div class="img-drop-hint">Toque para adicionar foto</div>';
  renderPF();
  document.getElementById('mCard').style.display='flex';
}

function addPF() { pf.push({acao:'',resp:'',prazo:'',status:'aberto'}); renderPF(); }
function delPF(i) { pf.splice(i,1); renderPF(); }
function upPF(i,k,v) { pf[i][k]=v; }

function renderPF() {
  const el = document.getElementById('planosForm');
  if (!pf.length) { el.innerHTML='<div style="font-size:12px;color:var(--muted);font-style:italic;margin-bottom:8px">Nenhuma ação.</div>'; return; }
  el.innerHTML = pf.map((p,i) => `
    <div class="plano-form-item">
      <div class="plano-form-hdr">
        <span>Ação ${i+1}</span>
        <button class="btn btn-sm btn-danger btn-icon" onclick="delPF(${i})">✕</button>
      </div>
      <div class="fg" style="margin-bottom:8px"><label>Descrição</label>
        <textarea oninput="upPF(${i},'acao',this.value)" style="min-height:54px">${esc(p.acao)}</textarea></div>
      <div class="g3">
        <div class="fg" style="margin-bottom:0"><label>Responsável</label>
          <input value="${esc(p.resp)}" oninput="upPF(${i},'resp',this.value)"></div>
        <div class="fg" style="margin-bottom:0"><label>Prazo</label>
          <input type="date" value="${p.prazo||''}" oninput="upPF(${i},'prazo',this.value)"></div>
        <div class="fg" style="margin-bottom:0"><label>Status</label>
          <select onchange="upPF(${i},'status',this.value)">
            <option value="aberto" ${p.status==='aberto'?'selected':''}>Aberto</option>
            <option value="em-andamento" ${p.status==='em-andamento'?'selected':''}>Em andamento</option>
            <option value="concluido" ${p.status==='concluido'?'selected':''}>Concluído</option>
          </select></div>
      </div>
    </div>`).join('');
}

async function saveCard() {
  const nome = document.getElementById('fNome').value.trim();
  if (!nome) { alert('Informe o nome do modelo.'); return; }
  const data = {
    ref: document.getElementById('fRef').value.trim(),
    nome,
    num: document.getElementById('fNum').value.trim(),
    obs: document.getElementById('fObs').value.trim(),
    planos: JSON.parse(JSON.stringify(pf))
  };
  if (tempImg) data.img = tempImg;

  if (editId) {
    const i = cards.findIndex(c=>c.id===editId);
    if (i>=0) Object.assign(cards[i], data);
  } else {
    cards.unshift({ id:uid(), comments:[], createdAt:new Date().toISOString(), ...data });
  }
  closeM('mCard');
  await saveData();
  renderCards();
}

async function delCard(id) {
  if (!confirm('Excluir este modelo?')) return;
  cards = cards.filter(c=>c.id!==id);
  await saveData(); renderCards();
}

// ── Modal plano ──────────────────────────────────────────────────
function openNewPlano(cardId) {
  editPlanoId=cardId; editPlanoIdx=null;
  document.getElementById('mPlanoTitle').textContent='Nova ação';
  ['pAcao','pResp','pPrazo'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('pStatus').value='aberto';
  document.getElementById('mPlano').style.display='flex';
}

function openEditPlano(cardId, idx) {
  const c=cards.find(x=>x.id===cardId); if(!c) return;
  const p=(c.planos||[])[idx]; if(!p) return;
  editPlanoId=cardId; editPlanoIdx=idx;
  document.getElementById('mPlanoTitle').textContent='Editar ação';
  document.getElementById('pAcao').value=p.acao||'';
  document.getElementById('pResp').value=p.resp||'';
  document.getElementById('pPrazo').value=p.prazo||'';
  document.getElementById('pStatus').value=p.status||'aberto';
  document.getElementById('mPlano').style.display='flex';
}

async function savePlano() {
  const acao=document.getElementById('pAcao').value.trim();
  if(!acao){alert('Descreva a ação.');return;}
  const i=cards.findIndex(c=>c.id===editPlanoId); if(i<0) return;
  if(!cards[i].planos) cards[i].planos=[];
  const obj={acao,resp:document.getElementById('pResp').value.trim(),
    prazo:document.getElementById('pPrazo').value,status:document.getElementById('pStatus').value};
  if(editPlanoIdx!==null) cards[i].planos[editPlanoIdx]=obj;
  else cards[i].planos.push(obj);
  closeM('mPlano');
  await saveData(); renderCards();
}

// ── Comentários ──────────────────────────────────────────────────
async function addComment(cardId) {
  const inp=document.getElementById('ci-'+cardId);
  const text=inp.value.trim(); if(!text) return;
  const i=cards.findIndex(c=>c.id===cardId); if(i<0) return;
  if(!cards[i].comments) cards[i].comments=[];
  cards[i].comments.push({user:getUser(),text,ts:new Date().toISOString()});
  inp.value='';
  await saveData(); renderCards();
  document.getElementById('ci-'+cardId)?.focus();
}

function allComments(id) {
  const c=cards.find(x=>x.id===id); if(!c) return;
  const html=(c.comments||[]).map(cm=>`
    <div class="cmt-item" style="margin-bottom:10px">
      <div class="avatar" style="background:${uColor(cm.user)}22;color:${uColor(cm.user)}">${initials(cm.user)}</div>
      <div class="cmt-body">
        <div class="cmt-user">${esc(cm.user)}</div>
        <div class="cmt-text">${esc(cm.text)}</div>
        <div class="cmt-time">${fmtDT(cm.ts)}</div>
      </div>
    </div>`).join('');
  const m=document.createElement('div');
  m.className='overlay'; m.id='mAll';
  m.onclick=e=>{if(e.target===m)m.remove()};
  m.innerHTML=`<div class="modal"><div class="modal-hdr"><h3>Comentários — ${esc(c.nome)}</h3>
    <button class="btn btn-sm btn-icon" onclick="document.getElementById('mAll').remove()">✕</button></div>
    <div class="modal-body" style="max-height:70vh;overflow-y:auto">${html}</div></div>`;
  document.body.appendChild(m);
}

// ── Utils ────────────────────────────────────────────────────────
function closeM(id){document.getElementById(id).style.display='none';}
function overlayClick(e,id){if(e.target===document.getElementById(id))closeM(id);}

// ── Init ─────────────────────────────────────────────────────────
loadData();
startPolling();
</script>
