<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#1D9E75">
<title>Calce de Calçados</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#f5f4f0;--card:#fff;--border:#e0deda;--text:#1a1a18;--muted:#888780;
  --accent:#1D9E75;--accent-l:#E1F5EE;--accent-d:#0F6E56;
  --warn:#BA7517;--warn-l:#FAEEDA;
  --danger:#E24B4A;--danger-l:#FCEBEB;
  --info:#378ADD;--info-l:#E6F1FB;
  --purple:#534AB7;--purple-l:#EEEDFE;
  --r:10px;--rl:16px;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);font-size:15px;min-height:100vh}

.topbar{background:var(--accent-d);padding:0 16px;display:flex;align-items:center;justify-content:space-between;height:54px;position:sticky;top:0;z-index:100;gap:8px}
.topbar h1{font-size:15px;font-weight:600;color:#fff;display:flex;align-items:center;gap:7px}
.topbar-btns{display:flex;gap:6px}

.userbar{background:#fff;border-bottom:1px solid var(--border);padding:8px 16px;display:flex;align-items:center;gap:8px;font-size:13px;flex-wrap:wrap}
.userbar label{color:var(--muted);font-weight:500;white-space:nowrap}
.userbar input{border:1px solid var(--border);border-radius:6px;padding:6px 10px;font-size:13px;font-family:inherit;background:var(--bg);color:var(--text);width:150px}
.userbar input:focus{outline:none;border-color:var(--accent)}

.btn{background:var(--card);border:1px solid var(--border);border-radius:7px;padding:7px 14px;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;color:var(--text);transition:all .15s;white-space:nowrap}
.btn:active{transform:scale(.97)}
.btn-accent{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-accent:hover{background:var(--accent-d)}
.btn-green{background:#25D366;color:#fff;border-color:#25D366;font-size:13px}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-icon{padding:5px 9px;font-size:14px;background:rgba(255,255,255,.15);border-color:rgba(255,255,255,.3);color:#fff}
.btn-icon:hover{background:rgba(255,255,255,.25)}
.btn-danger{background:var(--danger-l);color:var(--danger);border-color:var(--danger)}
.btn-danger:hover{background:var(--danger);color:#fff}

.main{padding:14px;max-width:1400px;margin:0 auto}
.toolbar{display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.toolbar h2{font-size:13px;font-weight:500;color:var(--muted);flex:1}
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:12px}

.card{background:var(--card);border:1px solid var(--border);border-radius:var(--rl);overflow:hidden}
.card-header{padding:12px 13px 10px;display:flex;align-items:flex-start;gap:10px;border-bottom:1px solid var(--border)}
.card-img{width:78px;height:78px;border-radius:8px;background:var(--bg);border:1px solid var(--border);flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative}
.card-img img{width:100%;height:100%;object-fit:cover}
.card-img .hint{position:absolute;inset:0;background:rgba(0,0,0,.5);color:#fff;font-size:11px;display:flex;align-items:center;justify-content:center;opacity:0;transition:.2s;text-align:center}
.card-img:hover .hint,.card-img:active .hint{opacity:1}
.card-info{flex:1;min-width:0}
.card-ref{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:2px}
.card-name{font-size:15px;font-weight:600;margin-bottom:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.card-date{font-size:11px;color:var(--muted)}
.card-actions{display:flex;gap:4px;flex-shrink:0}
.card-act{background:none;border:1px solid var(--border);border-radius:6px;padding:5px 8px;cursor:pointer;font-size:13px}
.card-act:hover{background:var(--bg)}
.card-act.danger{border-color:var(--danger);color:var(--danger)}

.sec{padding:10px 13px;border-bottom:1px solid var(--border)}
.sec-lbl{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:7px;display:flex;align-items:center;justify-content:space-between}
.sec-lbl span{display:flex;align-items:center;gap:5px}
.dot{width:7px;height:7px;border-radius:50%;display:inline-block;flex-shrink:0}
.d-info{background:var(--info)}.d-warn{background:var(--warn)}.d-purple{background:var(--purple)}

.obs-box{font-size:13px;line-height:1.55;background:var(--info-l);border-radius:7px;padding:8px 10px;color:#185FA5;min-height:36px;white-space:pre-wrap;word-break:break-word}
.obs-empty{color:var(--muted);font-style:italic;background:var(--bg)}

.plano-item{display:flex;gap:7px;margin-bottom:6px;background:var(--warn-l);border-radius:7px;padding:7px 9px;cursor:pointer}
.plano-item:last-child{margin-bottom:0}
.plano-dot{width:5px;height:5px;border-radius:50%;background:var(--warn);margin-top:6px;flex-shrink:0}
.plano-body{flex:1;font-size:13px}
.plano-acao{font-weight:500;color:var(--text)}
.plano-meta{font-size:11px;color:var(--warn);margin-top:2px;font-weight:500}
.sbadge{display:inline-block;padding:2px 7px;border-radius:10px;font-size:10px;font-weight:600;margin-top:3px}
.s-aberto{background:#FCEBEB;color:#A32D2D}
.s-em-andamento{background:var(--warn-l);color:var(--warn)}
.s-concluido{background:var(--accent-l);color:var(--accent-d)}

.cmt-sec{padding:10px 13px 12px}
.cmt-item{display:flex;gap:7px;margin-bottom:7px}
.avatar{width:26px;height:26px;border-radius:50%;font-size:10px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.cmt-body{flex:1;background:var(--bg);border-radius:0 7px 7px 7px;padding:6px 9px}
.cmt-user{font-size:11px;font-weight:600;color:var(--purple);margin-bottom:1px}
.cmt-text{font-size:13px;line-height:1.4;word-break:break-word}
.cmt-time{font-size:10px;color:var(--muted);margin-top:2px}
.cmt-row{display:flex;gap:7px;margin-top:8px;align-items:center}
.cmt-input{flex:1;border:1px solid var(--border);border-radius:7px;padding:7px 10px;font-size:13px;font-family:inherit;background:var(--bg);color:var(--text)}
.cmt-input:focus{outline:none;border-color:var(--accent)}
.more-btn{background:none;border:none;cursor:pointer;color:var(--info);font-size:12px;font-weight:500;padding:2px 0;font-family:inherit;display:block;margin-bottom:5px}

.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:flex-end;justify-content:center}
@media(min-width:600px){.overlay{align-items:center;padding:20px}}
.modal{background:var(--card);border-radius:20px 20px 0 0;width:100%;max-width:560px;max-height:92vh;overflow-y:auto}
@media(min-width:600px){.modal{border-radius:var(--rl)}}
.modal-hdr{padding:16px 16px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--card);z-index:1}
.modal-hdr h3{font-size:15px;font-weight:600}
.modal-body{padding:14px 16px}
.modal-ftr{padding:12px 16px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end;position:sticky;bottom:0;background:var(--card)}
.fg{margin-bottom:12px}
.fg label{display:block;font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.3px;margin-bottom:4px}
.fg input,.fg textarea,.fg select{width:100%;border:1px solid var(--border);border-radius:7px;padding:8px 10px;font-size:14px;font-family:inherit;background:var(--bg);color:var(--text)}
.fg input:focus,.fg textarea:focus,.fg select:focus{outline:none;border-color:var(--accent)}
.fg textarea{resize:vertical;min-height:72px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.img-drop{width:100%;height:110px;border-radius:8px;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:28px;color:var(--muted);border:2px dashed var(--border);cursor:pointer;overflow:hidden;margin-bottom:5px;position:relative}
.img-drop img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.img-drop-lbl{font-size:11px;color:var(--muted);text-align:center;position:relative;z-index:1}
.sep{border:none;border-top:1px solid var(--border);margin:4px 0 12px}
.sec-title{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:8px}
.pf-item{background:var(--bg);border-radius:8px;padding:10px;margin-bottom:8px;border:1px solid var(--border)}
.pf-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.pf-hdr span{font-size:12px;font-weight:600;color:var(--warn)}

/* Banner importar */
.import-banner{background:var(--accent-l);border:1px solid var(--accent);border-radius:var(--r);padding:12px 14px;margin-bottom:14px;font-size:13px;color:var(--accent-d);display:none}
.import-banner strong{display:block;font-size:14px;margin-bottom:6px}

.empty{text-align:center;padding:50px 20px;color:var(--muted);grid-column:1/-1}
.empty .ico{font-size:42px;margin-bottom:12px}
.empty h3{font-size:15px;font-weight:600;margin-bottom:5px;color:var(--text)}

/* Toast */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#1a1a18;color:#fff;padding:10px 18px;border-radius:20px;font-size:13px;font-weight:500;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}

@media(max-width:400px){.cards-grid{grid-template-columns:1fr}.g3{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>

<div class="topbar">
  <h1>👟 Calce de Calçados</h1>
  <div class="topbar-btns">
    <button class="btn btn-icon" onclick="compartilhar()" title="Compartilhar pelo WhatsApp">📤</button>
    <button class="btn btn-icon" onclick="exportarJSON()" title="Exportar backup">💾</button>
  </div>
</div>

<div class="userbar">
  <label>Seu nome:</label>
  <input id="unInput" placeholder="Digite seu nome…" maxlength="30"
    onkeydown="if(event.key==='Enter')setUser()">
  <button class="btn btn-sm btn-accent" id="unBtn" onclick="setUser()">Entrar</button>
  <span id="unLabel" style="font-weight:600;color:var(--accent);display:none"></span>
</div>

<div class="main">
  <div class="import-banner" id="importBanner">
    <strong>📥 Dados recebidos pelo WhatsApp!</strong>
    <span id="importInfo"></span>
    <div style="display:flex;gap:8px;margin-top:10px">
      <button class="btn btn-accent btn-sm" onclick="confirmarImport()">Importar e mesclar</button>
      <button class="btn btn-sm" onclick="document.getElementById('importBanner').style.display='none'">Ignorar</button>
    </div>
  </div>

  <div class="toolbar">
    <h2 id="countLbl">0 modelos</h2>
    <button class="btn btn-green btn-sm" onclick="compartilhar()">📤 Compartilhar</button>
    <button class="btn btn-accent" onclick="openNewCard()">+ Novo modelo</button>
  </div>
  <div id="grid" class="cards-grid">
    <div class="empty"><div class="ico">👟</div><h3>Nenhum modelo ainda</h3><p>Toque em "+ Novo modelo" para começar.</p></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- Modal card -->
<div id="mCard" class="overlay" style="display:none" onclick="overlayClick(event,'mCard')">
 <div class="modal">
  <div class="modal-hdr"><h3 id="mCardTitle">Novo modelo</h3><button class="btn btn-sm" onclick="closeM('mCard')">✕</button></div>
  <div class="modal-body">
    <div class="fg">
      <label>Foto do calçado</label>
      <div class="img-drop" id="imgDrop" onclick="document.getElementById('imgFile').click()">
        <span>📷</span><div class="img-drop-lbl">Toque para adicionar foto</div>
      </div>
      <input type="file" id="imgFile" accept="image/*" onchange="onImgFile(event)" style="display:none">
    </div>
    <div class="g2">
      <div class="fg"><label>Referência</label><input id="fRef" placeholder="REF-001"></div>
      <div class="fg"><label>Nome do modelo</label><input id="fNome" placeholder="Sport Runner"></div>
    </div>
    <div class="fg"><label>Numeração testada</label><input id="fNum" placeholder="Ex: 38, 39/40"></div>
    <div class="fg"><label>Observações de calce</label>
      <textarea id="fObs" placeholder="Ajuste, conforto, pressão, pontos de melhoria…"></textarea></div>
    <hr class="sep">
    <div class="sec-title">Planos de ação</div>
    <div id="planosForm"></div>
    <button class="btn btn-sm" onclick="addPF()" style="width:100%">+ Adicionar ação</button>
  </div>
  <div class="modal-ftr">
    <button class="btn" onclick="closeM('mCard')">Cancelar</button>
    <button class="btn btn-accent" onclick="saveCard()">Salvar</button>
  </div>
 </div>
</div>

<!-- Modal plano -->
<div id="mPlano" class="overlay" style="display:none" onclick="overlayClick(event,'mPlano')">
 <div class="modal">
  <div class="modal-hdr"><h3 id="mPlanoTitle">Plano de ação</h3><button class="btn btn-sm" onclick="closeM('mPlano')">✕</button></div>
  <div class="modal-body">
    <div class="fg"><label>Descrição da ação</label><textarea id="pAcao" placeholder="O que precisa ser feito…" style="min-height:72px"></textarea></div>
    <div class="g2">
      <div class="fg"><label>Responsável</label><input id="pResp" placeholder="Nome"></div>
      <div class="fg"><label>Prazo</label><input type="date" id="pPrazo"></div>
    </div>
    <div class="fg"><label>Status</label>
      <select id="pStatus">
        <option value="aberto">Aberto</option>
        <option value="em-andamento">Em andamento</option>
        <option value="concluido">Concluído</option>
      </select></div>
  </div>
  <div class="modal-ftr">
    <button class="btn" onclick="closeM('mPlano')">Cancelar</button>
    <button class="btn btn-accent" onclick="savePlano()">Salvar</button>
  </div>
 </div>
</div>

<script>
// ── Storage local ──────────────────────────────────────────────
let cards = JSON.parse(localStorage.getItem('calce_cards') || '[]');
let curUser = localStorage.getItem('calce_user') || '';
let editId = null, editPlanoId = null, editPlanoIdx = null;
let tempImg = null, pf = [];
let pendingImport = null;

function save() { localStorage.setItem('calce_cards', JSON.stringify(cards)); }

// ── Usuário ────────────────────────────────────────────────────
function setUser() {
  const v = document.getElementById('unInput').value.trim();
  if (!v) return;
  curUser = v;
  localStorage.setItem('calce_user', v);
  document.getElementById('unLabel').textContent = '✓ ' + v;
  document.getElementById('unLabel').style.display = 'inline';
  document.getElementById('unInput').style.display = 'none';
  document.getElementById('unBtn').style.display = 'none';
}
if (curUser) { document.getElementById('unInput').value = curUser; setUser(); }
function getUser() { return curUser || 'Anônimo'; }

// ── Helpers ────────────────────────────────────────────────────
function uColor(n){const c=['#534AB7','#1D9E75','#D85A30','#BA7517','#378ADD','#D4537E'];let h=0;for(const ch of(n||'?'))h=(h*31+ch.charCodeAt(0))%c.length;return c[h];}
function initials(n){return(n||'?').split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);}
function esc(t){return(t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function fmtDate(s){if(!s)return'';try{const d=new Date(s);return d.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric'});}catch{return s;}}
function fmtDT(s){if(!s)return'';try{const d=new Date(s);return d.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});}catch{return s;}}
function sLabel(s){return{aberto:'Aberto','em-andamento':'Em andamento',concluido:'Concluído'}[s]||'Aberto';}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}

function toast(msg, dur=2500) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), dur);
}

// ── Render ─────────────────────────────────────────────────────
function renderCards() {
  const grid = document.getElementById('grid');
  document.getElementById('countLbl').textContent =
    cards.length + ' modelo' + (cards.length!==1?'s':'') + ' cadastrado' + (cards.length!==1?'s':'');
  if (!cards.length) {
    grid.innerHTML = `<div class="empty"><div class="ico">👟</div><h3>Nenhum modelo ainda</h3><p>Toque em "+ Novo modelo" para começar.</p></div>`;
    return;
  }
  grid.innerHTML = cards.map(renderCard).join('');
}

function renderCard(c) {
  const img = c.img ? `<img src="${c.img}" alt="">` : `<span style="font-size:26px">📷</span>`;
  const planos = (c.planos||[]).map((p,i) => `
    <div class="plano-item" onclick="openEditPlano('${c.id}',${i})">
      <div class="plano-dot"></div>
      <div class="plano-body">
        <div class="plano-acao">${esc(p.acao)}</div>
        <div class="plano-meta">👤 ${esc(p.resp)}${p.prazo?' · 📅 '+fmtDate(p.prazo):''}</div>
        <span class="sbadge s-${p.status||'aberto'}">${sLabel(p.status)}</span>
      </div>
    </div>`).join('');
  const cmts = c.comments||[];
  const cmtHtml = cmts.slice(-3).map(cm=>`
    <div class="cmt-item">
      <div class="avatar" style="background:${uColor(cm.user)}22;color:${uColor(cm.user)}">${initials(cm.user)}</div>
      <div class="cmt-body">
        <div class="cmt-user">${esc(cm.user)}</div>
        <div class="cmt-text">${esc(cm.text)}</div>
        <div class="cmt-time">${fmtDT(cm.ts)}</div>
      </div>
    </div>`).join('');
  const moreBtn = cmts.length>3
    ? `<button class="more-btn" onclick="allComments('${c.id}')">Ver todos os ${cmts.length} comentários</button>`:''

  return `<div class="card" id="c-${c.id}">
    <div class="card-header">
      <div class="card-img" onclick="clickImg('${c.id}')">
        ${img}<div class="hint">📷 Trocar</div>
        <input type="file" id="fi-${c.id}" accept="image/*" onchange="onCardImg(event,'${c.id}')" style="display:none">
      </div>
      <div class="card-info">
        <div class="card-ref">${esc(c.ref||'—')}</div>
        <div class="card-name">${esc(c.nome||'Sem nome')}</div>
        ${c.num?`<div style="font-size:11px;color:var(--muted)">Nº ${esc(c.num)}</div>`:''}
        <div class="card-date">📅 ${fmtDate(c.createdAt)}</div>
      </div>
      <div class="card-actions">
        <button class="card-act" onclick="openEdit('${c.id}')">✏️</button>
        <button class="card-act danger" onclick="delCard('${c.id}')">🗑</button>
      </div>
    </div>
    <div class="sec">
      <div class="sec-lbl"><span><span class="dot d-info"></span>Observações de calce</span></div>
      <div class="obs-box ${c.obs?'':'obs-empty'}">${c.obs?esc(c.obs):'Nenhuma observação registrada.'}</div>
    </div>
    <div class="sec">
      <div class="sec-lbl">
        <span><span class="dot d-warn"></span>Plano de ação (${(c.planos||[]).length})</span>
        <button class="btn btn-sm" onclick="openNewPlano('${c.id}')">+ Ação</button>
      </div>
      ${planos||'<div style="font-size:12px;color:var(--muted);font-style:italic">Nenhuma ação cadastrada.</div>'}
    </div>
    <div class="cmt-sec">
      <div class="sec-lbl" style="margin-bottom:8px"><span><span class="dot d-purple"></span>Comentários (${cmts.length})</span></div>
      ${!cmts.length?'<div style="font-size:12px;color:var(--muted);font-style:italic;margin-bottom:6px">Sem comentários ainda.</div>':''}
      ${cmtHtml}${moreBtn}
      <div class="cmt-row">
        <div class="avatar" style="background:${uColor(getUser())}22;color:${uColor(getUser())}">${initials(getUser())}</div>
        <input class="cmt-input" id="ci-${c.id}" placeholder="Comentar…"
          onkeydown="if(event.key==='Enter')addComment('${c.id}')">
        <button class="btn btn-sm btn-accent" onclick="addComment('${c.id}')">↑</button>
      </div>
    </div>
  </div>`;
}

// ── Imagem ─────────────────────────────────────────────────────
function clickImg(id){document.getElementById('fi-'+id).click();}
function onCardImg(e,id){const f=e.target.files[0];if(!f)return;compressImg(f,b=>{const i=cards.findIndex(c=>c.id===id);if(i<0)return;cards[i].img=b;save();renderCards();});}
function onImgFile(e){const f=e.target.files[0];if(!f)return;compressImg(f,b=>{tempImg=b;const d=document.getElementById('imgDrop');d.innerHTML=`<img src="${b}">`;});}
function compressImg(file,cb){const r=new FileReader();r.onload=ev=>{const img=new Image();img.onload=()=>{const c=document.createElement('canvas');const max=600;let w=img.width,h=img.height;if(w>max||h>max){if(w>h){h=Math.round(h*max/w);w=max;}else{w=Math.round(w*max/h);h=max;}}c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);cb(c.toDataURL('image/jpeg',.72));};img.src=ev.target.result;};r.readAsDataURL(file);}

// ── Card CRUD ──────────────────────────────────────────────────
function openNewCard(){editId=null;tempImg=null;pf=[];document.getElementById('mCardTitle').textContent='Novo modelo';['fRef','fNome','fNum','fObs'].forEach(id=>document.getElementById(id).value='');document.getElementById('imgDrop').innerHTML='<span>📷</span><div class="img-drop-lbl">Toque para adicionar foto</div>';renderPF();document.getElementById('mCard').style.display='flex';}
function openEdit(id){const c=cards.find(x=>x.id===id);if(!c)return;editId=id;tempImg=c.img||null;pf=JSON.parse(JSON.stringify(c.planos||[]));document.getElementById('mCardTitle').textContent='Editar modelo';document.getElementById('fRef').value=c.ref||'';document.getElementById('fNome').value=c.nome||'';document.getElementById('fNum').value=c.num||'';document.getElementById('fObs').value=c.obs||'';document.getElementById('imgDrop').innerHTML=c.img?`<img src="${c.img}">`:'<span>📷</span><div class="img-drop-lbl">Toque para adicionar foto</div>';renderPF();document.getElementById('mCard').style.display='flex';}

function addPF(){pf.push({acao:'',resp:'',prazo:'',status:'aberto'});renderPF();}
function delPF(i){pf.splice(i,1);renderPF();}
function upPF(i,k,v){pf[i][k]=v;}
function renderPF(){const el=document.getElementById('planosForm');if(!pf.length){el.innerHTML='<div style="font-size:12px;color:var(--muted);font-style:italic;margin-bottom:8px">Nenhuma ação.</div>';return;}el.innerHTML=pf.map((p,i)=>`<div class="pf-item"><div class="pf-hdr"><span>Ação ${i+1}</span><button class="btn btn-sm btn-danger" onclick="delPF(${i})">✕</button></div><div class="fg" style="margin-bottom:8px"><label>Descrição</label><textarea oninput="upPF(${i},'acao',this.value)" style="min-height:52px">${esc(p.acao)}</textarea></div><div class="g3"><div class="fg" style="margin-bottom:0"><label>Responsável</label><input value="${esc(p.resp)}" oninput="upPF(${i},'resp',this.value)"></div><div class="fg" style="margin-bottom:0"><label>Prazo</label><input type="date" value="${p.prazo||''}" oninput="upPF(${i},'prazo',this.value)"></div><div class="fg" style="margin-bottom:0"><label>Status</label><select onchange="upPF(${i},'status',this.value)"><option value="aberto" ${p.status==='aberto'?'selected':''}>Aberto</option><option value="em-andamento" ${p.status==='em-andamento'?'selected':''}>Em andamento</option><option value="concluido" ${p.status==='concluido'?'selected':''}>Concluído</option></select></div></div></div>`).join('');}

function saveCard(){const nome=document.getElementById('fNome').value.trim();if(!nome){alert('Informe o nome do modelo.');return;}const data={ref:document.getElementById('fRef').value.trim(),nome,num:document.getElementById('fNum').value.trim(),obs:document.getElementById('fObs').value.trim(),planos:JSON.parse(JSON.stringify(pf))};if(tempImg)data.img=tempImg;if(editId){const i=cards.findIndex(c=>c.id===editId);if(i>=0)Object.assign(cards[i],data);}else{cards.unshift({id:uid(),comments:[],createdAt:new Date().toISOString(),...data});}save();closeM('mCard');renderCards();toast('✅ Modelo salvo!');}
function delCard(id){if(!confirm('Excluir este modelo?'))return;cards=cards.filter(c=>c.id!==id);save();renderCards();toast('🗑 Modelo excluído');}

// ── Plano CRUD ─────────────────────────────────────────────────
function openNewPlano(cardId){editPlanoId=cardId;editPlanoIdx=null;document.getElementById('mPlanoTitle').textContent='Nova ação';['pAcao','pResp','pPrazo'].forEach(id=>document.getElementById(id).value='');document.getElementById('pStatus').value='aberto';document.getElementById('mPlano').style.display='flex';}
function openEditPlano(cardId,idx){const c=cards.find(x=>x.id===cardId);if(!c)return;const p=(c.planos||[])[idx];if(!p)return;editPlanoId=cardId;editPlanoIdx=idx;document.getElementById('mPlanoTitle').textContent='Editar ação';document.getElementById('pAcao').value=p.acao||'';document.getElementById('pResp').value=p.resp||'';document.getElementById('pPrazo').value=p.prazo||'';document.getElementById('pStatus').value=p.status||'aberto';document.getElementById('mPlano').style.display='flex';}
function savePlano(){const acao=document.getElementById('pAcao').value.trim();if(!acao){alert('Descreva a ação.');return;}const i=cards.findIndex(c=>c.id===editPlanoId);if(i<0)return;if(!cards[i].planos)cards[i].planos=[];const obj={acao,resp:document.getElementById('pResp').value.trim(),prazo:document.getElementById('pPrazo').value,status:document.getElementById('pStatus').value};if(editPlanoIdx!==null)cards[i].planos[editPlanoIdx]=obj;else cards[i].planos.push(obj);save();closeM('mPlano');renderCards();toast('✅ Ação salva!');}

// ── Comentários ────────────────────────────────────────────────
function addComment(cardId){const inp=document.getElementById('ci-'+cardId);const text=inp.value.trim();if(!text)return;const i=cards.findIndex(c=>c.id===cardId);if(i<0)return;if(!cards[i].comments)cards[i].comments=[];cards[i].comments.push({user:getUser(),text,ts:new Date().toISOString()});inp.value='';save();renderCards();document.getElementById('ci-'+cardId)?.focus();}
function allComments(id){const c=cards.find(x=>x.id===id);if(!c)return;const html=(c.comments||[]).map(cm=>`<div class="cmt-item" style="margin-bottom:10px"><div class="avatar" style="background:${uColor(cm.user)}22;color:${uColor(cm.user)}">${initials(cm.user)}</div><div class="cmt-body"><div class="cmt-user">${esc(cm.user)}</div><div class="cmt-text">${esc(cm.text)}</div><div class="cmt-time">${fmtDT(cm.ts)}</div></div></div>`).join('');const m=document.createElement('div');m.className='overlay';m.id='mAll';m.onclick=e=>{if(e.target===m)m.remove()};m.innerHTML=`<div class="modal"><div class="modal-hdr"><h3>Comentários — ${esc(c.nome)}</h3><button class="btn btn-sm" onclick="document.getElementById('mAll').remove()">✕</button></div><div class="modal-body" style="max-height:70vh;overflow-y:auto">${html}</div></div>`;document.body.appendChild(m);}

// ── Compartilhar / Importar ────────────────────────────────────
function exportarJSON() {
  // Exporta sem imagens (muito pesado para WhatsApp)
  const semImg = cards.map(c => {
    const {img, ...rest} = c;
    return {...rest, temFoto: !!img};
  });
  const json = JSON.stringify({v:1, cards: semImg, exportadoPor: getUser(), ts: new Date().toISOString()});
  const blob = new Blob([json], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'calce-backup-' + new Date().toLocaleDateString('pt-BR').replace(/\//g,'-') + '.json';
  a.click();
  toast('💾 Backup exportado!');
}

function compartilhar() {
  // Comprime dados sem imagens para caber na URL
  const semImg = cards.map(c => {
    const {img, ...rest} = c;
    return rest;
  });
  const dados = JSON.stringify({v:1, cards: semImg, de: getUser(), ts: new Date().toISOString()});
  const b64 = btoa(unescape(encodeURIComponent(dados)));
  const url = window.location.href.split('?')[0] + '?dados=' + b64;

  if (url.length > 60000) {
    // Muitos dados — oferece download
    toast('⚠️ Muitos dados! Use o botão 💾 para exportar o arquivo.');
    return;
  }

  const msg = encodeURIComponent(
    '👟 *Acompanhamento de Calce — Atualização*\n' +
    'Enviado por: ' + getUser() + '\n' +
    'Modelos: ' + cards.length + '\n\n' +
    'Abra o link para ver e importar os dados:\n' + url
  );
  window.open('https://wa.me/?text=' + msg, '_blank');
}

// Verificar se veio dados na URL
function checkImport() {
  const params = new URLSearchParams(window.location.search);
  const dados = params.get('dados');
  if (!dados) return;
  try {
    const obj = JSON.parse(decodeURIComponent(escape(atob(dados))));
    if (!obj.cards) return;
    pendingImport = obj;
    const banner = document.getElementById('importBanner');
    document.getElementById('importInfo').textContent =
      `${obj.cards.length} modelo(s) enviado(s) por ${obj.de || 'alguém'} em ${fmtDT(obj.ts)}`;
    banner.style.display = 'block';
    // Limpar URL
    window.history.replaceState({}, '', window.location.pathname);
  } catch(e) { console.log('Import inválido'); }
}

function confirmarImport() {
  if (!pendingImport) return;
  let merged = 0, atualizados = 0;
  pendingImport.cards.forEach(nc => {
    const idx = cards.findIndex(c => c.id === nc.id);
    if (idx >= 0) {
      // Mesclar comentários
      const cmtsExist = new Set((cards[idx].comments||[]).map(c=>c.ts+c.user));
      const novosCmts = (nc.comments||[]).filter(c=>!cmtsExist.has(c.ts+c.user));
      cards[idx].comments = [...(cards[idx].comments||[]), ...novosCmts];
      // Atualizar dados (mantém foto local)
      const img = cards[idx].img;
      Object.assign(cards[idx], nc);
      if (img) cards[idx].img = img;
      atualizados++;
    } else {
      cards.unshift(nc);
      merged++;
    }
  });
  save(); renderCards();
  document.getElementById('importBanner').style.display = 'none';
  toast(`✅ ${merged} novo(s) + ${atualizados} atualizado(s)!`, 3000);
}

function closeM(id){document.getElementById(id).style.display='none';}
function overlayClick(e,id){if(e.target===document.getElementById(id))closeM(id);}

// ── Init ───────────────────────────────────────────────────────
checkImport();
renderCards();
</script>
